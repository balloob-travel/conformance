name: ci

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  check:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install package
        run: uv sync

      - name: Clone implementation repos
        run: |
          uv run python scripts/setup_repositories.py

      - name: Run conformance harness
        run: |
          uv run python scripts/run_all.py \
            --results-dir artifacts/results \
            --build-report-path artifacts/build-report.json \
            --from "aiosendspin,sendspin-go" \
            --to "aiosendspin,sendspin-cpp,sendspin-dotnet,sendspin-go,sendspin-js,sendspin-rs,SendspinKit"
