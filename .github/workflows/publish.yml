name: publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  publish-report:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare artifact directories
        run: |
          mkdir -p artifacts/results
          printf "host=macos\n" > artifacts/results/.keep

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version-file: "pyproject.toml"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.1"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Install package
        run: uv sync

      - name: Clone implementation repos
        run: |
          uv run python scripts/setup_repositories.py

      - name: Run conformance harness
        id: run_harness
        continue-on-error: true
        run: |
          uv run python scripts/run_all.py \
            --results-dir artifacts/results \
            --build-report-path artifacts/build-report.json \
            --from "aiosendspin,sendspin-go" \
            --to "aiosendspin,sendspin-cpp,sendspin-dotnet,sendspin-go,sendspin-js,sendspin-rs,SendspinKit"

      - name: Record harness outcome
        if: always()
        run: |
          echo "### macOS" >> "$GITHUB_STEP_SUMMARY"
          echo "Harness outcome: ${{ steps.run_harness.outcome }}" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ steps.run_harness.outcome }}" != "success" ]; then
            echo "Conformance failures are currently expected; the Pages report was still generated." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: artifacts/results
          if-no-files-found: warn

      - name: Setup Pages
        if: always() && github.event_name != 'pull_request'
        uses: actions/configure-pages@v5

      - name: Upload Pages Artifact
        if: always() && github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: artifacts/results

  deploy-pages:
    needs: publish-report
    if: always() && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
